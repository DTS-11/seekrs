name: Release

on:
  push:
    tags:
      - "v*"   # triggers when you push a tag like v0.1.0

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: seekrs.exe

          # macOS (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: seekrs

          # macOS (Apple Silicon M1/M2)
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: seekrs

          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: seekrs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf seekrs-${{ matrix.target }}.tar.gz ${{ matrix.binary }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.binary }} -DestinationPath seekrs-${{ matrix.target }}.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/${{ matrix.target }}/release/seekrs-${{ matrix.target }}.*