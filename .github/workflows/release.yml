name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false    # ← KEY FIX: one job failing won't cancel the rest
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: seekrs.exe

          - os: macos-13           # ← use macos-13 (Intel), more stable than macos-latest
            target: x86_64-apple-darwin
            binary: seekrs

          - os: macos-latest       # ← Apple Silicon stays on latest
            target: aarch64-apple-darwin
            binary: seekrs

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: seekrs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf seekrs-$